name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compile translations
        run: |
          pip install babel
          pybabel compile -d src/gpuforge/locale -D gpuforge

      - name: Build with PyInstaller
        run: |
          pyinstaller gpuforge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPUForge-${{ matrix.arch }}
          path: dist/GPUForge.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compile translations
        run: |
          pip install babel
          pybabel compile -d src/gpuforge/locale -D gpuforge

      - name: Build with PyInstaller
        run: |
          pyinstaller gpuforge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPUForge-linux
          path: dist/GPUForge
