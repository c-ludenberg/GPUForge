name: Build

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compile translations
        run: |
          pip install babel
          pybabel compile -d src/gpuforge/locale -D gpuforge

      - name: Build with PyInstaller
        run: |
          pyinstaller gpuforge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPUForge-${{ matrix.arch }}
          path: dist/GPUForge.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compile translations
        run: |
          pip install babel
          pybabel compile -d src/gpuforge/locale -D gpuforge

      - name: Build with PyInstaller
        run: |
          pyinstaller gpuforge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPUForge-linux
          path: dist/GPUForge

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: GPUForge-x64
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: GPUForge-linux
          path: release

      - name: Rename binaries
        run: |
          mv release/GPUForge.exe release/GPUForge-windows-x64.exe
          mv release/GPUForge release/GPUForge-linux-x64
          chmod +x release/GPUForge-linux-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: GPUForge ${{ github.ref_name }}
          body: |
            ## GPUForge ${{ github.ref_name }}

            Pobierz plik wykonywalny dla swojej platformy.

            **Windows:** `GPUForge-windows-x64.exe`
            **Linux:** `GPUForge-linux-x64`

            ---

            Download the executable for your platform.

            **Windows:** `GPUForge-windows-x64.exe`
            **Linux:** `GPUForge-linux-x64`
          files: |
            release/GPUForge-windows-x64.exe
            release/GPUForge-linux-x64
          draft: false
          prerelease: false
